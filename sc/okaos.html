<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKAOs - No Disponible</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700;900&display=swap" rel="stylesheet">
    <link class="okaos-logo-ref" rel="icon" type="image/jpg" href="../img/logo.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-drag: none;
        }
        img {
            pointer-events: none;
        }
        body {
            background: #000000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: url('../img/fn/f1.gif') no-repeat center center/cover;
            z-index: 1;
        }
        .hero-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.3) 100%);
        }
        .main-layout {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        .logo-container {
            max-width: 180px;
            width: 100%;
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(-50px);
            animation: logoEntrance 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .logo-container img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0px 8px 20px rgba(0,0,0,0.7));
        }
        .message-card {
            background: linear-gradient(135deg, rgba(20, 20, 20, 0.95) 0%, rgba(10, 10, 10, 0.98) 100%);
            border: 4px solid #ffffff;
            padding: 40px 30px;
            box-shadow: -10px 10px 0px rgba(0, 0, 0, 0.8);
            transform: skewX(-8deg);
            width: 100%;
            margin-bottom: 35px;
            position: relative;
        }
        .message-card::before {
            content: '';
            position: absolute;
            bottom: 20px;
            left: -24px;
            width: 0;
            height: 0;
            border: 10px solid transparent;
            border-right-color: #ffffff;
            transform: skewX(8deg);
            z-index: 1;
        }
        .message-card::after {
            content: '';
            position: absolute;
            bottom: 22px;
            left: -18px;
            width: 0;
            height: 0;
            border: 8px solid transparent;
            border-right-color: #141414;
            transform: skewX(8deg);
            z-index: 2;
        }
        .card-content {
            transform: skewX(8deg);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .title-main {
            font-family: 'Fredoka', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.6);
        }
        .text-main {
            color: #e0e0e0;
            font-size: 1.1rem;
            line-height: 1.6;
            letter-spacing: 0.5px;
        }
        .text-main strong {
            color: #ffffff;
            font-weight: 900;
        }
        .btn-wrapper {
            transform: rotate(-4deg);
            opacity: 0;
            transform: skewX(-16deg) translateX(-100px);
            animation: btnEntrance 0.5s 0.3s ease-out forwards;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #ffffff;
            background: #141414;
            border: 5px solid #ffffff;
            transform: skewX(-16deg);
            box-shadow: -8px 8px 0px rgba(0, 0, 0, 0.8);
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.1s ease, color 0.1s ease, box-shadow 0.1s ease;
            width: 280px;
            height: 75px;
            font-size: 1.6rem;
        }
        .btn span {
            font-family: 'Arial Black', 'Impact', sans-serif;
            transform: skewX(16deg);
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            letter-spacing: 1px;
        }
        .btn:hover {
            background: #ffffff;
            color: #000000;
            transform: skewX(-16deg) scale(1.04) translate(4px, -4px);
            box-shadow: -12px 12px 0px rgba(0, 0, 0, 0.9);
        }
        .btn:hover span {
            text-shadow: none;
        }
        .btn.bounce-active {
            animation: smoothBounce 0.4s ease-out;
        }
        @keyframes logoEntrance {
            0% { opacity: 0; transform: translateY(-50px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes btnEntrance {
            0% { opacity: 0; transform: skewX(-16deg) translateX(-100px); }
            100% { opacity: 1; transform: skewX(-16deg) translateX(0); }
        }
        @keyframes smoothBounce {
            0% { transform: skewX(-16deg) scale(1); }
            50% { transform: skewX(-16deg) scale(1.06); }
            100% { transform: skewX(-16deg) scale(1); }
        }
        @media (max-width: 768px) {
            .message-card {
                transform: skewX(0deg);
                padding: 30px 20px;
            }
            .message-card::before, .message-card::after {
                display: none;
            }
            .card-content {
                transform: skewX(0deg);
            }
            .title-main {
                font-size: 1.8rem;
            }
            .text-main {
                font-size: 1rem;
            }
            .btn-wrapper {
                transform: rotate(0deg);
                width: 100%;
                display: flex;
                justify-content: center;
            }
            .btn {
                transform: skewX(0deg);
                width: 100%;
                max-width: 280px;
                box-shadow: -6px 6px 0px rgba(0, 0, 0, 0.8);
            }
            .btn span {
                transform: skewX(0deg);
            }
            .btn:hover {
                transform: skewX(0deg) scale(1.02) translate(2px, -2px);
            }
            @keyframes btnEntrance {
                0% { opacity: 0; transform: skewX(0deg) translateX(-50px); }
                100% { opacity: 1; transform: skewX(0deg) translateX(0); }
            }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="hero-bg"></div>

    <div class="main-layout">
        <div class="logo-container">
            <img src="../img/logo.png" alt="OKAOs">
        </div>

        <div class="message-card">
            <div class="card-content">
                <div class="title-main">Próximamente</div>
                <div class="text-main">Aún no está disponible toda la información. Por favor, <strong>vuelve más tarde</strong>.</div>
            </div>
        </div>

        <div class="btn-wrapper">
            <a href="/" class="btn" id="btnInicio">
                <span>Inicio</span>
            </a>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('btnInicio');
            setTimeout(() => {
                if (btn) {
                    btn.classList.add('bounce-active');
                    btn.addEventListener('animationend', () => {
                        btn.classList.remove('bounce-active');
                    }, { once: true });
                }
            }, 800);
        });
    </script>

</body>
</html>
